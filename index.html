<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#215c5c">
    <title>14 Story Inventory Tracker</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Building project</p>
          <h1>Inventory Tracker</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="backupBtn" type="button" title="Download backup" aria-label="Download backup">BK</button>
          <button class="icon-button" id="exportCsvBtn" type="button" title="Export CSV" aria-label="Export CSV">CSV</button>
        </div>
      </header>

      <main>
        <section class="summary-band" aria-label="Inventory summary">
          <div>
            <span class="metric" id="totalItems">0</span>
            <span class="label">items</span>
          </div>
          <div>
            <span class="metric" id="lowStock">0</span>
            <span class="label">low stock</span>
          </div>
          <div>
            <span class="metric" id="installedItems">0</span>
            <span class="label">installed</span>
          </div>
          <div>
            <span class="metric" id="totalValue">$0</span>
            <span class="label">value</span>
          </div>
        </section>

        <section class="workspace">
          <aside class="floor-panel" aria-label="Floor progress">
            <div class="section-title">
              <h2>Floors</h2>
              <span id="activeFloorLabel">All floors</span>
            </div>
            <div class="tower-visual" id="towerVisual" aria-label="14 story building floor selector"></div>
          </aside>

          <section class="inventory-panel">
            <div class="tabs" role="tablist" aria-label="Inventory views">
              <button class="tab active" data-view="items" type="button">Items</button>
              <button class="tab" data-view="add" type="button">Add</button>
              <button class="tab" data-view="backup" type="button">Backup</button>
            </div>

            <div class="view active" id="itemsView">
              <div class="filters" aria-label="Inventory filters">
                <label>
                  Search
                  <input id="searchInput" type="search" placeholder="Cement, pipe, cable...">
                </label>
                <label>
                  Category
                  <select id="categoryFilter">
                    <option value="">All categories</option>
                  </select>
                </label>
                <label>
                  Status
                  <select id="statusFilter">
                    <option value="">All statuses</option>
                    <option value="Ordered">Ordered</option>
                    <option value="Delivered">Delivered</option>
                    <option value="Stored">Stored</option>
                    <option value="In use">In use</option>
                    <option value="Installed">Installed</option>
                    <option value="Damaged">Damaged</option>
                  </select>
                </label>
              </div>

              <div class="item-list" id="itemList" aria-live="polite"></div>
              <p class="empty-state" id="emptyState">No items match the current filters.</p>
            </div>

            <div class="view" id="addView">
              <form id="itemForm" class="item-form">
                <input type="hidden" id="itemId">
                <div class="form-grid">
                  <label>
                    Item name
                    <input id="nameInput" required placeholder="Rebar, cement, conduit...">
                  </label>
                  <label>
                    Category
                    <select id="categoryInput" required>
                      <option value="Concrete">Concrete</option>
                      <option value="Steel">Steel</option>
                      <option value="Masonry">Masonry</option>
                      <option value="Electrical">Electrical</option>
                      <option value="Plumbing">Plumbing</option>
                      <option value="HVAC">HVAC</option>
                      <option value="Finishes">Finishes</option>
                      <option value="Safety">Safety</option>
                      <option value="Tools">Tools</option>
                      <option value="Other">Other</option>
                    </select>
                  </label>
                  <label>
                    Floor
                    <select id="floorInput" required></select>
                  </label>
                  <label>
                    Status
                    <select id="statusInput" required>
                      <option>Ordered</option>
                      <option>Delivered</option>
                      <option>Stored</option>
                      <option>In use</option>
                      <option>Installed</option>
                      <option>Damaged</option>
                    </select>
                  </label>
                  <label>
                    Quantity
                    <input id="quantityInput" required type="number" min="0" step="0.01" value="1">
                  </label>
                  <label>
                    Unit
                    <input id="unitInput" required placeholder="bags, pcs, m, rolls">
                  </label>
                  <label>
                    Minimum stock
                    <input id="minimumInput" type="number" min="0" step="0.01" value="0">
                  </label>
                  <label>
                    Unit cost
                    <input id="costInput" type="number" min="0" step="0.01" value="0">
                  </label>
                  <label>
                    Supplier
                    <input id="supplierInput" placeholder="Supplier name">
                  </label>
                  <label>
                    Location
                    <input id="locationInput" placeholder="Basement store, floor 7 east...">
                  </label>
                </div>
                <label>
                  Notes
                  <textarea id="notesInput" rows="3" placeholder="Delivery condition, batch number, next action..."></textarea>
                </label>
                <div class="form-actions">
                  <button class="secondary" id="resetFormBtn" type="button">Clear</button>
                  <button class="primary" type="submit">Save item</button>
                </div>
              </form>
            </div>

            <div class="view" id="backupView">
              <div class="backup-tools">
                <div>
                  <h2>Move Data Safely</h2>
                  <p>Your inventory is saved in this browser. Use backup before changing phones or computers.</p>
                </div>
                <button class="primary" id="downloadJsonBtn" type="button">Download JSON backup</button>
                <label class="file-control">
                  Restore backup
                  <input id="restoreInput" type="file" accept="application/json">
                </label>
                <button class="danger" id="clearDataBtn" type="button">Clear all data</button>
              </div>
            </div>
          </section>
        </section>
      </main>
    </div>

    <template id="itemTemplate">
      <article class="item-card">
        <div class="item-main">
          <div>
            <p class="category"></p>
            <h3></h3>
          </div>
          <span class="status"></span>
        </div>
        <div class="item-details"></div>
        <div class="item-notes"></div>
        <div class="card-actions">
          <button class="secondary edit-btn" type="button">Edit</button>
          <button class="danger delete-btn" type="button">Delete</button>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
